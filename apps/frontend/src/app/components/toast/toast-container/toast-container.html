<div class="fixed bottom-4 right-4 z-[100] flex flex-col-reverse gap-2 max-w-sm w-full pointer-events-none">
    @for (t of toast.toasts(); track t.id) {
    <div
        class="toast-enter flex items-center gap-3 rounded-xl border px-4 py-3 backdrop-blur-sm shadow-sm pointer-events-auto text-text {{ classFor(t.type) }}">
        <ng-icon [name]="iconFor(t.type)" size="20" class="shrink-0 mt-0.5" />
        <span class="flex-1 text-sm">{{ t.message }}</span>
        <button (click)="toast.dismiss(t.id)"
            class="flex items-center justify-center shrink-0 opacity-50 hover:opacity-100 transition-opacity">
            <ng-icon name="heroXMark" size="16" />
        </button>
    </div>
    }
</div>

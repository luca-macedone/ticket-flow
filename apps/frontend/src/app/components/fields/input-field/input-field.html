<div class="flex flex-col gap-1">
    <label class="flex flex-col gap-1.5" [attr.for]="id() || null">
        <span class="font-semibold text-text/70">{{ label() }}</span>
        <input [attr.id]="id() || null" [type]="type()" [placeholder]="placeholder()" [formControl]="control()"
            [class]="inputClass" />
    </label>
    @if (errorMessage) {
    <p class="text-primary pl-1">{{ errorMessage }}</p>
    }
</div>

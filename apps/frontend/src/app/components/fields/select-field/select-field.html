<div class="flex flex-col gap-1">
    <label class="flex flex-col gap-1.5" [attr.for]="id() || null">
        <span class="font-semibold text-text/70">{{ label() }}</span>
        <select [attr.id]="id() || null" [formControl]="control()" [class]="selectClass">
            <option value="" disabled>{{ placeholder() }}</option>
            @for (opt of options(); track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
            }
        </select>
    </label>
    @if (errorMessage) {
    <p class="text-primary pl-1">{{ errorMessage }}</p>
    }
</div>

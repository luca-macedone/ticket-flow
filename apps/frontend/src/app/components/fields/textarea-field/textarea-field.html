<div class="flex flex-col gap-1">
    <label class="flex flex-col gap-1.5" [attr.for]="id() || null">
        <span class="font-semibold text-text/70">{{ label() }}</span>
        <textarea [attr.id]="id() || null" [placeholder]="placeholder()" [formControl]="control()" [rows]="rows()"
            [class]="textareaClass"></textarea>
    </label>
    @if (errorMessage) {
    <p class="text-primary pl-1">{{ errorMessage }}</p>
    }
</div>

<section>
    @if (loading()) {
    <p class="text-text/60">Caricamento...</p>
    } @else if (error()) {
    <p class="text-red-400">{{ error() }}</p>
    } @else if (company()) {
    <app-base-card [title]="company()!.companyName" [description]="company()?.description ?? undefined">
        <section class="grid grid-cols-2 gap-3">
            <app-base-card title="company info">
                <span class="px-6 py-2 border border-text/10 rounded-full italic font-heading">
                    <strong class="not-italic text-base font-body">Company:</strong>
                    {{company()?.companyName}}
                </span>
                <span class="px-6 py-2 border border-text/10 rounded-full italic font-heading">
                    <strong class="not-italic text-base font-body">Referral:</strong>
                    {{company()?.referralEmail}}
                </span>
                <span class="px-6 py-2 border border-text/10 rounded-full italic font-heading">
                    <strong class="not-italic text-base font-body">Nationality:</strong>
                    {{company()?.nationality}}
                </span>
            </app-base-card>
            <!-- <app-base-card title="company info">
                <span class="px-6 py-2 border border-text/10 rounded-full italic font-heading">
                    <strong class="not-italic text-base font-body">Projects:</strong>
                    {{company()?.projects}}
                </span>
            </app-base-card> -->
        </section>
    </app-base-card>
    }
</section>

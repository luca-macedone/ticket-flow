            <a routerLink="/dashboard" class="text-3xl font-mono text-amber-600 font-semibold">Ticket Flow</a>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Assumenda minus dolore magnam, nihil reiciendis,
                nobis veniam quo nemo ullam alias voluptate culpa at ad temporibus id ipsa, obcaecati quas facilis.</p>

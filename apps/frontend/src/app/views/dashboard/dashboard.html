<div class="h-screen w-full bg-amber-400/10 grid grid-cols-6 overflow-hidden">
    <aside class="flex flex-col gap-3 border-e-2 bg-amber-400/10 border-amber-200 p-3 col-span-1 justify-between">
        <header>
            <a routerLink="/dashboard" class="text-3xl font-mono text-amber-600 font-semibold">Ticket Flow</a>
        </header>
        <footer class="flex justify-end">
            <button (click)="logout()"
                class="px-3 py-1.5 rounded-full bg-amber-800 text-amber-50 hover:cursor-pointer hover:opacity-95">
                Log Out
            </button>
        </footer>
    </aside>

    <section class="grid grid-cols-5 grid-flow-row col-span-5 max-h-24">
        <div class="col-span-5 p-5 border-b-2 border-amber-200 flex flex-col gap-3">
            <h2 class="text-2xl font-mono font-bold border-s-8 border-amber-700 ps-4">
                <span class="capitalize">{{ user()?.name ?? 'user' }}</span>'s Dashboard
            </h2>
            <app-breadcrump />
        </div>

        @if (isPending()) {
        <div class="col-span-5 m-5 p-4 rounded-lg border-2 border-amber-400 bg-amber-50 flex items-center gap-3">
            <span class="text-amber-700 text-xl">⏳</span>
            <div>
                <p class="font-semibold text-amber-800">Account in attesa di approvazione</p>
                <p class="text-sm text-amber-700">Le funzionalità saranno disponibili una volta che un amministratore
                    approva il tuo account.</p>
            </div>
        </div>
        } @else {
        <div class="col-span-5 max-h-60 flex flex-col">
            <router-outlet />
        </div>
        }
    </section>
</div>

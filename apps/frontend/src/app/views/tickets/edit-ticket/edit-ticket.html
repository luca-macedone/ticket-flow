<section>
    @if (loading()) {
    <p class="text-text/60">Caricamento...</p>
    } @else {
    <app-base-card title="Edit Ticket" description="Update the ticket details.">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-3">
            <div class="grid grid-cols-2 gap-3">
                <app-input-field label="Code" [control]="form.controls.ticketCode"
                    [error]="errors['ticketCode']?.[0] ?? null"></app-input-field>
                <app-input-field label="Name" [control]="form.controls.ticketName"
                    [error]="errors['ticketName']?.[0] ?? null"></app-input-field>
                <app-textarea-field label="Description" [control]="form.controls.ticketDescription"
                    [error]="errors['ticketDescription']?.[0] ?? null" class="col-span-2"></app-textarea-field>
                <app-select-field label="Category" [control]="form.controls.category" [options]="categoryOptions"
                    [error]="errors['category']?.[0] ?? null"></app-select-field>
                <app-select-field label="Priority" [control]="form.controls.priority" [options]="priorityOptions"
                    [error]="errors['priority']?.[0] ?? null"></app-select-field>
                <app-select-field label="Status" [control]="form.controls.status" [options]="statusOptions"
                    [error]="errors['status']?.[0] ?? null"></app-select-field>
                <app-select-field label="Project" [control]="form.controls.projectId" [options]="projects()"
                    placeholder="No project" [error]="errors['projectId']?.[0] ?? null"></app-select-field>
                <app-date-field label="Start Date" [control]="form.controls.startDate"
                    [error]="errors['startDate']?.[0] ?? null"></app-date-field>
                <app-date-field label="End Date" [control]="form.controls.endDate"
                    [error]="errors['endDate']?.[0] ?? null"></app-date-field>
            </div>

            @if (hasErrors) {
            <div class="px-3 py-2 bg-background/20 border-primary/40 border rounded-xl">
                <strong class="text-primary text-lg">Error</strong>
                @for (entry of errors | keyvalue; track entry.key) {
                <p class="text-md"><em class="text-primary font-semibold capitalize">{{entry.key}}:</em>
                    {{entry.value[0]}}</p>
                }
            </div>
            }

            <div class="flex gap-3 justify-between">
                <button type="button"
                    class="border border-secondary/40 bg-secondary/30 text-text px-[40px] py-2 rounded-full font-body text-base hover:opacity-90 transition-all ease-in capitalize backdrop-blur-xl"
                    (click)="cancel()">Cancel</button>
                <div class="flex gap-3">
                    <button type="button"
                        class="border border-secondary/40 bg-secondary/30 text-text px-[40px] py-2 rounded-full font-body text-base hover:opacity-90 transition-all ease-in capitalize backdrop-blur-xl"
                        (click)="reset()">Reset</button>
                    <button type="submit"
                        class="border border-accent/40 bg-accent/30 text-text px-[40px] py-2 rounded-full font-body text-base hover:opacity-90 transition-all ease-in capitalize backdrop-blur-xl">
                        Update Ticket</button>
                </div>
            </div>
        </form>
    </app-base-card>
    }
</section>

<div class="min-h-screen w-full flex items-center justify-center relative bg-background text-text">
    @if(reason && reason.length > 0) {
    <div
        class="absolute top-3 mx-auto p-4 rounded-4xl border-2 border-primary bg-primary rounded-full text-base text-background dark:text-text min-w-[300px] w-fit px-6 text-center">
        <strong class="font-mono capitalize">Error:</strong> {{reason}}
    </div>
    }
    <section class="flex flex-col items-center gap-6 min-w-[740px]">
        <div class="flex flex-col gap-0">
            <h1 class="font-heading text-5xl">
                Ticket<em class="text-accent">Flow</em>
            </h1>
            <p class="font-heading text-xl self-end">Yours problems, our mission.</p>
        </div>

        <footer class="flex gap-6 mt-[100px] justify-center w-full">
            <button (click)="toggleForm()"
                class="border border-accent bg-accent text-text dark:text-background px-[40px] py-2 rounded-full font-body text-base font-thin hover:opacity-90 transition-all ease-in">Get
                Started</button>
        </footer>
    </section>
    @if (isFormVisible()) {
    <section
        class="border-2 rounded-4xl p-4  absolute top-auto left-auto right-auto z-50 bg-accent/50 border-accent backdrop-blur-3xl rounded-3xl w-fit flex flex-col gap-3 min-w-[400px]">
        <header class="flex justify-between items-center gap-6 border-b-2 border-accent pb-3">
            <h2 class="text-xl font-heading">
                @if (formType() == "login") {
                Welcome Back
                } @else if(formType() == "register") {
                Create Account
                }
            </h2>
            <button (click)="toggleForm()"
                class="border border-accent bg-accent text-text p-5 rounded-full font-body text-base font-thin hover:opacity-90 relative transition-all ease-in">
                <span class="absolute top-1/4 left-0 right-0">X</span>
            </button>
        </header>
        @if(formType() == "login") {
        <app-login-form />
        } @else if(formType() == "register"){
        <app-register-form />
        }
    </section>
    }

</div>

<section>
    <app-base-card title="Edit Project" description="Update the project details." [loading]="loading()"
        [skeletonLines]="6">
        <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-3">
            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col gap-1 pt-0.5">
                    <span class="font-semibold text-text/70">Code <em
                            class="text-sm font-mono text-text/50">(auto-generated)</em></span>
                    <p
                        class="px-6 py-2 border border-secondary/60 rounded-xl font-mono opacity-60 bg-secondary/10 text-text/80 cursor-not-allowed">
                        {{ displayCode() }}
                    </p>
                </div>
                <app-input-field label="Project Name" type="text" [control]="form.controls.projectName"
                    [error]="errors['projectName']?.[0] ?? null"></app-input-field>
                <app-date-field label="Start Date" [control]="form.controls.startDate"
                    [error]="errors['startDate']?.[0] ?? null">
                </app-date-field>
                <app-date-field label="End Date" [control]="form.controls.endDate"
                    [error]="errors['endDate']?.[0] ?? null">
                </app-date-field>
                <app-textarea-field label="Description" [control]="form.controls.description"
                    [error]="errors['description']?.[0] ?? null" class="col-span-2"></app-textarea-field>
                <app-select-field label="Company" [control]="form.controls.companyId" [options]="companies()"
                    [error]="errors['companyId']?.[0] ?? null" class="col-span-2">
                </app-select-field>
            </div>

            @if (hasErrors) {
            <div class="px-3 py-2 bg-background/20 border-primary/40 border rounded-xl">
                <strong class="text-primary text-lg">Error</strong>
                @for (entry of errors | keyvalue; track entry.key) {
                <p class="text-md"><em class="text-primary font-semibold capitalize">{{entry.key}}:</em>
                    {{entry.value[0]}}
                </p>
                }
            </div>
            }

            <div class="flex gap-3 justify-between">
                <button type="button"
                    class="border border-secondary/40 bg-secondary/30 text-text px-[40px] py-2 rounded-full font-body text-base hover:opacity-90 transition-all ease-in capitalize backdrop-blur-xl"
                    (click)="cancel()">Cancel</button>
                <div class="flex gap-3">
                    <button type="button"
                        class="border border-secondary/40 bg-secondary/30 text-text px-[40px] py-2 rounded-full font-body text-base hover:opacity-90 transition-all ease-in capitalize backdrop-blur-xl"
                        (click)="reset()">Reset</button>
                    <button type="submit"
                        class="border border-accent/40 bg-accent/30 text-text px-[40px] py-2 rounded-full font-body text-base hover:opacity-90 transition-all ease-in capitalize backdrop-blur-xl"
                        [disabled]="isSubmitting()">{{isSubmitting() ? 'Saving...' : 'Update project'}}</button>
                </div>
            </div>
        </form>
    </app-base-card>
</section>

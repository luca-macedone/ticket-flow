<section class="p-5 min-h-60">
    <h3 class="text-xl font-mono font-bold border-s-8 border-amber-700 ps-4">Projects</h3>
    <div class="grid grid-cols-3 gap-3 pt-5">
        @for (project of projects.filter(x => x.isVisibile); track project.id) {
        <a [routerLink]="`/dashboard/projects/${project.id}`"
            class="border-2 p-5 rounded-xl border-amber-300 max-h-48 flex flex-col gap-3 hover:scale-95 hover:opacity-95 hover:cursor-pointer transition-all ease-in">
            <header>
                <h5 class="font-semibold capitalize">
                    {{project.name}}
                </h5>
            </header>
            <main class="flex flex-col  h-full w-full gap-3">
                <p class="bg-amber-100 rounded-2xl p-5">
                    {{project.description}}
                </p>
                <div class="flex justify-end items-baseline gap-5 py-3">
                    <span>
                        Ongoing Tickets:
                    </span>
                    <span class="text-2xl font-bold">
                        {{project.tasks.length}}
                    </span>

                </div>
            </main>
        </a>
        } @empty {
        <li>Nothing.</li>
        }
    </div>
</section>

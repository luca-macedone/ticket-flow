<section class="flex flex-col gap-4 p-4 border border-text/10 rounded-2xl">
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-semibold font-heading text-primary">Projects management</h2>
        @if (isAdmin() || isAgent()) {
        <button
            class="border border-accent/40 bg-accent/30 text-text px-[40px] py-2 rounded-full font-body text-base hover:opacity-90 transition-all ease-in capitalize backdrop-blur-xl"
            (click)="newProject()">Create New Project</button>
        }
    </div>
    @if (error()) {
    <p class="text-red-400">{{ error() }}</p>
    } @else {
    <app-data-table [columns]="columns" [rows]="projects()" [loading]="loading()" [skeletonRows]="20"
        emptyMessage="No project found." (rowClick)="viewProject($event)" [hideable]="true" />
    }
</section>
